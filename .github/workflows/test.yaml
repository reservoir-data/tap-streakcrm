name: Test tap-streakcrm

on:
  push:
    branches: [main]
    paths:
      - tap_streakcrm/**
      - tests/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/test.yaml
  pull_request:
    paths:
      - tap_streakcrm/**
      - tests/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/test.yaml
  workflow_dispatch:
  schedule:
  # Run weekly on Monday at 12:00 PM UTC
  - cron: "0 12 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 1
  # renovate: datasource=pypi depName=uv
  UV_VERSION: 0.11.25
  # renovate: datasource=pypi depName=tox
  TOX_VERSION: 4.56.1
  # renovate: datasource=pypi depName=tox-uv
  TOX_UV_VERSION: 1.35.2

jobs:
  build-package:
    name: Build & verify package
    runs-on: ubuntu-latest
    outputs:
      supported-python-versions: ${{ steps.baipp.outputs.supported_python_classifiers_json_array }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: hynek/build-and-inspect-python-package@efb823f52190ad02594531168b7a2d5790e66516 # v2.14.0
        id: baipp

  test:
    name: Test
    runs-on: ubuntu-24.04
    needs: build-package
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.build-package.outputs.supported-python-versions) }}

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
      with:
        python-version: ${{ matrix.python-version }}
        version: ${{ env.UV_VERSION }}
    - name: Run tests
      env:
        TAP_STREAKCRM_API_KEY: ${{ secrets.TAP_STREAKCRM_API_KEY }}
        MATRIX_PYTHON_VERSION: ${{ matrix.python-version }}
      run: >
        uvx
        --with tox-uv=="${TOX_UV_VERSION}"
        --with tox=="${TOX_VERSION}"
        tox -e "${MATRIX_PYTHON_VERSION}"

  static:
    name: Static analysis
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
      with:
        version: ${{ env.UV_VERSION }}
    - run: >
        uv tool install
        --managed-python
        --with tox-uv=="${TOX_UV_VERSION}"
        --from tox=="${TOX_VERSION}"
        tox
    - name: Static type checking
      run: tox -e typing
    - name: Unused, missing and transitive dependencies
      run: tox -e dependencies
